    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: #faf9f6; color: #333; }

        /* Header */
        .header {
            background: #1a3a2a; padding: 0; position: sticky; top: 0; z-index: 100;
            box-shadow: 0 2px 12px rgba(0,0,0,0.15);
        }
        .header .container {
            max-width: 1200px; margin: 0 auto; padding: 0 24px;
        }
        .header-content {
            display: flex; align-items: center; justify-content: space-between; height: 64px;
        }
        .logo {
            font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: 700;
            color: #c8a45e; text-decoration: none; letter-spacing: 0.5px;
        }
        .nav { display: flex; align-items: center; gap: 24px; }
        .nav a {
            color: rgba(255,255,255,0.85); text-decoration: none; font-size: 0.9rem;
            font-weight: 500; transition: color 0.2s;
        }
        .nav a:hover { color: #c8a45e; }
        .nav a.active { color: #c8a45e; }

        /* Page content */
        .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }

        .page-header {
            padding: 40px 0 20px;
        }
        .page-header h1 {
            font-family: 'Playfair Display', serif; font-size: 2rem; color: #1a3a2a;
            margin-bottom: 8px;
        }
        .page-header p { color: #666; font-size: 0.95rem; line-height: 1.5; }

        /* Stats bar */
        .stats-bar {
            display: flex; gap: 24px; flex-wrap: wrap; padding: 16px 20px;
            background: #1a3a2a; border-radius: 12px; margin-bottom: 24px;
        }
        .stat-item {
            display: flex; align-items: center; gap: 8px; color: rgba(255,255,255,0.9);
            font-size: 0.85rem;
        }
        .stat-number {
            font-size: 1.3rem; font-weight: 700; color: #c8a45e;
            font-family: 'Playfair Display', serif;
        }

        /* Controls */
        .controls {
            display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end;
            margin-bottom: 24px; background: white; padding: 16px 20px;
            border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .control-group { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 200px; }
        .control-group label {
            font-size: 0.7rem; font-weight: 600; text-transform: uppercase;
            color: #888; letter-spacing: 0.5px;
        }
        .search-input {
            padding: 10px 14px; border: 1.5px solid #ddd; border-radius: 8px;
            font-size: 0.9rem; font-family: inherit; background: white; width: 100%;
        }
        .search-input:focus { outline: none; border-color: #1a3a2a; }

        /* Language tabs */
        .lang-tabs {
            display: flex; gap: 0; margin-bottom: 0;
        }
        .lang-tab {
            padding: 8px 20px; border: 1.5px solid #ddd; background: white;
            font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: all 0.2s;
            font-family: inherit; color: #666;
        }
        .lang-tab:first-child { border-radius: 8px 0 0 8px; }
        .lang-tab:last-child { border-radius: 0 8px 8px 0; }
        .lang-tab:not(:first-child) { border-left: none; }
        .lang-tab.active { background: #1a3a2a; color: white; border-color: #1a3a2a; }
        .lang-tab.active + .lang-tab { border-left-color: #1a3a2a; }

        /* Category tabs */
        .category-tabs {
            display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px;
        }
        .cat-tab {
            padding: 6px 16px; border: 1.5px solid #ddd; border-radius: 20px;
            background: white; font-size: 0.8rem; font-weight: 500; cursor: pointer;
            transition: all 0.2s; font-family: inherit; color: #555;
        }
        .cat-tab:hover { border-color: #1a3a2a; color: #1a3a2a; }
        .cat-tab.active { background: #c8a45e; color: white; border-color: #c8a45e; }

        /* Response cards */
        .responses-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 16px; margin-bottom: 60px;
        }
        .response-card {
            background: white; border-radius: 12px; padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06); position: relative;
            border-left: 4px solid #c8a45e; transition: box-shadow 0.2s;
        }
        .response-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
        .response-card.hidden { display: none; }

        .card-header {
            display: flex; align-items: flex-start; gap: 12px; margin-bottom: 12px;
        }
        .card-icon {
            font-size: 1.5rem; line-height: 1; flex-shrink: 0; width: 36px;
            height: 36px; display: flex; align-items: center; justify-content: center;
            background: #f0ebe0; border-radius: 8px;
        }
        .card-meta { flex: 1; }
        .card-category {
            font-size: 0.65rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.5px; color: #c8a45e; margin-bottom: 2px;
        }
        .card-question {
            font-family: 'Playfair Display', serif; font-size: 1rem; font-weight: 600;
            color: #1a3a2a; line-height: 1.3;
        }

        .card-answer {
            font-size: 0.88rem; line-height: 1.7; color: #444; white-space: pre-wrap;
            margin-bottom: 14px; padding: 12px 14px; background: #faf9f6;
            border-radius: 8px; border: 1px solid #eee;
        }

        .card-actions { display: flex; gap: 8px; align-items: center; }
        .btn-copy {
            padding: 7px 18px; border: 1.5px solid #1a3a2a; border-radius: 8px;
            background: white; color: #1a3a2a; font-weight: 600; font-size: 0.8rem;
            cursor: pointer; transition: all 0.2s; font-family: inherit;
        }
        .btn-copy:hover { background: #1a3a2a; color: white; }
        .btn-copy.copied { background: #27ae60; border-color: #27ae60; color: white; }

        .char-count { font-size: 0.7rem; color: #999; }

        /* Mobile menu */
        .mobile-menu-btn {
            display: none; background: none; border: none; cursor: pointer;
            padding: 8px; flex-direction: column; gap: 5px;
        }
        .mobile-menu-btn span {
            display: block; width: 24px; height: 2px; background: white; border-radius: 2px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .nav { display: none; flex-direction: column; position: absolute; top: 64px; left: 0; right: 0;
                background: #1a3a2a; padding: 20px; gap: 16px; }
            .nav.active { display: flex; }
            .mobile-menu-btn { display: flex; }
            .responses-grid { grid-template-columns: 1fr; }
            .controls { flex-direction: column; }
            .control-group { min-width: 100%; }
            .page-header h1 { font-size: 1.5rem; }
            .stats-bar { gap: 16px; }
            .lang-tab { padding: 8px 14px; font-size: 0.75rem; }
        }
    </style>
</head>

    <script>
const currentLang = { value: 'en' };
const currentCat = { value: 'all' };

const RESPONSES = [
    // =========== CONFOTUR & TAXES ===========
    {
        category: "confotur",
        icon: "🏛",
        question: {
            en: "What is CONFOTUR?",
            es: "Que es CONFOTUR?",
            fr: "C'est quoi le CONFOTUR?",
            ru: "Chto takoe CONFOTUR?"
        },
        answer: {
            en: "CONFOTUR is a Dominican tax incentive law (Law 158-01) that exempts qualifying tourism properties from taxes for 15 years. That means 0% transfer tax at closing, 0% annual property tax, 0% capital gains, and 0% on rental income. On a $300K property, you're saving roughly $9,000 just on the transfer tax alone. It's one of the biggest reasons foreign investors choose DR over other Caribbean markets. Happy to share more details — I'm based here in Punta Cana.",
            es: "CONFOTUR es la Ley 158-01 de incentivo turistico de RD. Exonera propiedades turisticas calificadas por 15 anos: 0% impuesto de transferencia, 0% impuesto a la propiedad (IPI), 0% ganancia de capital, y 0% impuesto sobre ingresos de alquiler. En una propiedad de US$300K, te ahorras unos $9,000 solo en transferencia. Es una de las razones principales por las que los inversionistas eligen RD sobre otros mercados del Caribe. Si quieres mas detalles, escribeme al WhatsApp: 809-486-5386.",
            fr: "Le CONFOTUR c'est la loi 158-01 en Republique dominicaine — elle exempte les proprietes touristiques de taxes pendant 15 ans. Ca veut dire 0% taxe de transfert a la cloture, 0% impot foncier annuel, 0% gain en capital, et 0% sur les revenus locatifs. Sur un condo de 300K$, tu sauves environ 9 000$ juste sur le transfert. C'est LA raison principale pour laquelle les investisseurs choisissent la RD. Ecris-moi si tu veux que je t'explique comment ca s'applique a ton cas.",
            ru: "CONFOTUR — eto dominikanskij zakon 158-01 o nalogovyh lgotah dlya turisticheskoj nedvizhimosti. On osvobozhdaet ot nalogov na 15 let: 0% nalog na peredachu, 0% ezhegodnyj nalog na nedvizhimost, 0% nalog na prirost kapitala, 0% nalog na arendnyj dohod. Na ob'ekte za $300K vy ekonomite okolo $9,000 tolko na naloge na peredachu. S radostyu rasskazhu podrobnee — ya zhivu zdes v Punta Cana."
        }
    },
    {
        category: "confotur",
        icon: "🏛",
        question: {
            en: "Is CONFOTUR worth it?",
            es: "Vale la pena CONFOTUR?",
            fr: "Ca vaut la peine le CONFOTUR?",
            ru: "CONFOTUR togo stoit?"
        },
        answer: {
            en: "Absolutely. On a $300K property, CONFOTUR saves you roughly $9,000 on transfer tax alone (3%), plus zero property tax for 15 years — that's thousands more saved over time. And if you sell at a profit or rent it out, those gains are tax-free too. The only catch is the property must be in a qualifying tourism project and registered with the CTC. Not every listing has it, so always verify. DM me if you want specifics for your situation.",
            es: "Sin duda. En una propiedad de US$300K, CONFOTUR te ahorra unos $9,000 solo en impuesto de transferencia (3%), mas cero impuesto a la propiedad por 15 anos — son miles mas ahorrados a largo plazo. Y si vendes con ganancia o alquilas, esos ingresos estan exentos tambien. Lo unico es que la propiedad tiene que estar en un proyecto turistico calificado y registrado con el CTC. No todos los listados lo tienen, asi que siempre verifica. Escribeme si quieres que te mande un desglose.",
            fr: "Absolument. Sur un condo de 300K$, le CONFOTUR te sauve environ 9 000$ juste en taxe de transfert (3%), plus zero impot foncier pendant 15 ans — ca fait des milliers de plus en economies. Et si tu revends avec profit ou tu loues, ces revenus sont aussi exemptes. Le seul detail: le projet doit etre enregistre au CTC. Pas tous les condos l'ont, faut toujours verifier. DM-moi si tu veux un calcul pour ton budget.",
            ru: "Odnoznachno da. Na ob'ekte za $300K CONFOTUR ekonomit okolo $9,000 tolko na naloge na peredachu (3%), plyus nol nalog na nedvizhimost 15 let. Esli prodate s pribylyu ili sdadite v arendu — eti dohody tozhe bez naloga. Edinstvennyj nyuans: proekt dolzhen byt zaregistrirovan v CTC. Ne vse ob'ekty imeyut CONFOTUR, vsegda proveryajte. Napishite mne, esli hotite podrobnee — WhatsApp: 809-486-5386."
        }
    },
    {
        category: "confotur",
        icon: "🏛",
        question: {
            en: "What taxes do foreigners pay in DR?",
            es: "Que impuestos pagan los extranjeros en RD?",
            fr: "Quels impots les etrangers paient en RD?",
            ru: "Kakie nalogi platyat inostrantsy v DR?"
        },
        answer: {
            en: "Without CONFOTUR: transfer tax is 3% of assessed value at closing, annual property tax (IPI) is 1% on properties over ~RD$8.1M, capital gains tax is 27%, and rental income is taxed at 27%. WITH CONFOTUR, all of that goes to zero for 15 years. Foreigners have the exact same property rights as Dominicans — no restrictions. Closing costs total roughly 3-5% depending on your lawyer and notary fees. I can send you a quick breakdown if you're interested.",
            es: "Sin CONFOTUR: impuesto de transferencia es 3% del valor catastral, impuesto a la propiedad (IPI) es 1% sobre propiedades arriba de ~RD$8.1M, ganancia de capital es 27%, e ingresos de alquiler pagan 27%. CON CONFOTUR, todo eso baja a cero por 15 anos. Los extranjeros tienen los mismos derechos de propiedad que los dominicanos — sin restricciones. Los costos de cierre totalizan entre 3-5% dependiendo del abogado y notario. Puedo mandarte un desglose rapido si te interesa.",
            fr: "Sans CONFOTUR: taxe de transfert de 3%, impot foncier (IPI) de 1% sur les proprietes au-dessus de ~8.1M RD$, gain en capital 27%, revenus locatifs 27%. AVEC CONFOTUR, tout ca tombe a zero pendant 15 ans. Les etrangers ont exactement les memes droits de propriete que les Dominicains — aucune restriction. Les frais de cloture totalisent environ 3-5% selon l'avocat et le notaire. Ecris-moi si tu veux un calcul precis pour ton budget.",
            ru: "Bez CONFOTUR: nalog na peredachu 3%, ezhegodnyj nalog na nedvizhimost (IPI) 1% (na ob'ekty dorozhe ~8.1M RD$), nalog na prirost kapitala 27%, nalog na arendnyj dohod 27%. S CONFOTUR vse eto — nol na 15 let. Inostrantsy imeyut tochno takie zhe prava na nedvizhimost kak i dominikatsy — bez ogranichenij. Raskhody na zakrytie sdelki — okolo 3-5%. Mogu otpravit podrobnyj raschet, esli interesno."
        }
    },
    {
        category: "confotur",
        icon: "🏛",
        question: {
            en: "How long does CONFOTUR last?",
            es: "Cuanto dura el CONFOTUR?",
            fr: "Ca dure combien le CONFOTUR?",
            ru: "Skolko dlitsya CONFOTUR?"

        answer: {
            en: "CONFOTUR exemptions last 15 years from the date the project was registered — not from when you buy. So always ask how many years are left on a specific property. Some newer projects still have the full 15 years; some older ones might have 8-10 left. The exemption transfers with the property if you sell. It covers transfer tax, property tax, capital gains, and rental income tax. Happy to check on any specific project for you — I'm based here in Punta Cana.",
            es: "Las exenciones de CONFOTUR duran 15 anos desde que el proyecto fue registrado, no desde que compras. Asi que siempre pregunta cuantos anos le quedan a un proyecto especifico. Algunos proyectos nuevos tienen los 15 anos completos; otros mas viejos quizas tienen 8-10. La exencion se transfiere con la propiedad si vendes. Cubre transferencia, IPI, ganancia de capital e impuesto sobre alquiler. Con gusto te verifico cualquier proyecto — WhatsApp: 809-486-5386.",
            fr: "Les exemptions CONFOTUR durent 15 ans a partir de la date d'enregistrement du PROJET, pas de ton achat. Demande toujours combien d'annees il reste sur un projet specifique. Certains projets recents ont encore les 15 ans au complet; d'autres plus vieux en ont 8-10. L'exemption se transfere avec la propriete si tu revends. Ca couvre transfert, impot foncier, gain en capital et revenu locatif. Je peux verifier n'importe quel projet pour toi si tu veux.",

        }
    },

        icon: "📋",

        },
        answer: {
            en: "Yes — foreigners have the exact same property rights as Dominican citizens. No special permits, no residency required, no restrictions on ownership. You can buy, sell, rent, and inherit property freely. The Dominican Republic is one of the most foreigner-friendly countries in the Caribbean for real estate. You just need a valid passport and a good lawyer to handle the title search and closing. Happy to share more — I'm based here in Punta Cana.",
            es: "Si — los extranjeros tienen exactamente los mismos derechos de propiedad que los dominicanos. No necesitas permisos especiales, ni residencia, ni hay restricciones. Puedes comprar, vender, alquilar y heredar libremente. RD es uno de los paises mas amigables del Caribe para inversion inmobiliaria extranjera. Solo necesitas pasaporte vigente y un buen abogado para el deslinde y cierre. Escribeme si quieres que te recomiende uno.",
            fr: "Oui — les etrangers ont exactement les memes droits de propriete que les Dominicains. Pas de permis special, pas besoin de residence, aucune restriction. Tu peux acheter, vendre, louer et leguer librement. La RD est un des pays les plus ouverts des Caraibes pour l'immobilier etranger. T'as juste besoin d'un passeport valide et d'un bon avocat pour la verification du titre et la cloture. Ecris-moi si tu veux que je te recommande quelqu'un.",
            ru: "Da — inostrantsy imeyut tochno takie zhe prava na nedvizhimost, kak i grazhdane Dominikanskoj Respubliki. Ne nuzhny spetsialnye razresheniya, vid na zhitelstvo ili drugoj status. Mozhno pokupat, prodavat, sdavat v arendu i nasledovat svobodno. DR — odna iz samyh otkrytyh stran Karibov dlya inostrannyh investorov. Nuzhny tolko dejstvuyushchij pasport i horoshij advokat. S radostyu rasskazhu podrobnee — ya zdes v Punta Cana."

    },

        icon: "📋",
        question: {
            en: "What are closing costs in DR?",

            fr: "C'est quoi les frais de cloture en RD?",
            ru: "Kakie raskhody na zakrytie sdelki v DR?"

        answer: {
            en: "Typically 3-5% of the purchase price. That includes: transfer tax (3% — waived with CONFOTUR), legal fees (1-1.5%), notary, and registration. Some developers also charge a small admin fee. With CONFOTUR, your closing costs drop significantly since the 3% transfer tax is eliminated. Always budget for lawyer's fees regardless — a good attorney is non-negotiable. I can send you a quick breakdown if you're interested.",
            es: "Normalmente entre 3-5% del precio de compra. Incluye: impuesto de transferencia (3% — exento con CONFOTUR), honorarios legales (1-1.5%), notario y registro. Algunos desarrolladores cobran una tarifa administrativa. Con CONFOTUR, los costos bajan bastante porque se elimina el 3% de transferencia. Siempre presupuesta los honorarios del abogado — un buen abogado no es opcional. Puedo mandarte un desglose detallado si quieres.",
            fr: "Generalement 3-5% du prix d'achat. Ca inclut: taxe de transfert (3% — annulee avec CONFOTUR), frais juridiques (1-1.5%), notaire et enregistrement. Certains developpeurs chargent des frais admin aussi. Avec le CONFOTUR, tes couts baissent pas mal parce que le 3% de transfert est elimine. Prevois toujours les frais d'avocat — un bon avocat c'est non negociable. DM-moi si tu veux un calcul precis.",
            ru: "Obychno 3-5% ot tseny pokupki. Vklyuchaet: nalog na peredachu (3% — otmenyaetsya pri CONFOTUR), yuridicheskie uslugi (1-1.5%), notarius i registratsiya. Nekotorye zastrojshchiki berut administrativnyj sbor. S CONFOTUR rashody sushchestvenno snighayutsya, tak kak 3% nalog ubiraaetsya. Vsegda zakladyvajte byudzhet na advokata — eto obyazatelno. Mogu otpravit podrobnyj raschet — WhatsApp: 809-486-5386."
        }

    {
        category: "buying",
        icon: "📋",
        question: {
            en: "Do I need a lawyer to buy in DR?",
            es: "Necesito abogado para comprar en RD?",
            fr: "J'ai besoin d'un avocat pour acheter en RD?",

let activeLang = 'en';
let activeCat = 'all';

function switchLang(lang) {
    activeLang = lang;
    document.querySelectorAll('.lang-tab').forEach(t => t.classList.toggle('active', t.dataset.lang === lang));
    renderCards();
}

function filterCategory(cat) {
    activeCat = cat;
    document.querySelectorAll('.cat-tab').forEach(t => t.classList.toggle('active', t.dataset.cat === cat));
    renderCards();
}

function filterCards() {
    renderCards();
}

function renderCards() {
    const search = document.getElementById('search').value.toLowerCase().trim();
    const grid = document.getElementById('responses-grid');
    grid.innerHTML = '';
    let visibleCount = 0;

    RESPONSES.forEach((r, idx) => {
        // Category filter
        if (activeCat !== 'all' && r.category !== activeCat) return;

        // Search filter — check question and answer in all languages
        if (search) {
            const searchable = [
                r.question.en, r.question.es, r.question.fr, r.question.ru,
                r.answer.en, r.answer.es, r.answer.fr, r.answer.ru,
                r.category
            ].join(' ').toLowerCase();
            if (!searchable.includes(search)) return;
        }

        visibleCount++;
        const catLabels = {
            confotur: 'CONFOTUR & Taxes',
            buying: 'Buying Process',
            investment: 'Investment & ROI',
            areas: 'Areas & Locations',
            living: 'Living & Lifestyle',
            objections: 'Common Objections'
        };

        const answer = r.answer[activeLang];
        const question = r.question[activeLang];

        const card = document.createElement('div');
        card.className = 'response-card';
        card.innerHTML = `
            <div class="card-header">
                <div class="card-icon">${r.icon}</div>
                <div class="card-meta">
                    <div class="card-category">${catLabels[r.category]}</div>
                    <div class="card-question">${escapeHtml(question)}</div>
                </div>
            </div>
            <div class="card-answer">${escapeHtml(answer)}</div>
            <div class="card-actions">
                <button class="btn-copy" onclick="copyResponse(this, ${idx})">Copy Response</button>
                <span class="char-count">${answer.length} chars</span>
            </div>
        `;
        grid.appendChild(card);
    });

    document.getElementById('visible-count').textContent = visibleCount;
    document.getElementById('total-count').textContent = RESPONSES.length;
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function copyResponse(btn, idx) {
    const text = RESPONSES[idx].answer[activeLang];
    navigator.clipboard.writeText(text).then(() => {
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(() => {
            btn.textContent = 'Copy Response';
            btn.classList.remove('copied');
        }, 2000);
    });
}

// Initial render
renderCards();
    </script>
