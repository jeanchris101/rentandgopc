name: Weekly Data Refresh

on:
  schedule:
    # Every Sunday at 11 PM UTC (7 PM DR time)
    - cron: '0 23 * * 0'
  workflow_dispatch: # Manual trigger

permissions:
  contents: write

jobs:
  refresh-market-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run data refresh script
        run: node automation/scripts/refresh-site-data.js

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet || echo "has_changes=true" >> $GITHUB_OUTPUT

      - name: Commit and push changes
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add market-intel.html roi-calculator.html
          git commit -m "chore: weekly data refresh from automation pipeline

          Updated market-intel.html and roi-calculator.html with latest
          data from automation/data/*.json

          Automated by GitHub Actions"
          git push

      - name: Trigger Vercel redeploy
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          curl -s -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}" || echo "Vercel webhook not configured yet"
